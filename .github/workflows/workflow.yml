name: CI — Build, Test & E2E

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # Job 1: compile, unit tests, package, upload artifacts
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and run unit tests
        run: ./gradlew clean build --no-daemon

      - name: Upload app JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
          if-no-files-found: warn

      - name: Upload web client
        uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: web/**
          if-no-files-found: warn

  # Job 2: E2E test for websocket client
  e2e:
    name: E2E Tests 
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app Docker image
        run: docker build -t trafficsim:latest .

      - name: Run E2E suite
        run: |
          docker compose -f docker-compose.e2e.yml up \
            --abort-on-container-exit \
            --exit-code-from e2e

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml down --remove-orphans
